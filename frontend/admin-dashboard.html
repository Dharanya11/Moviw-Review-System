<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Movie Review System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #fff;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
      padding: 2rem;
      border-radius: 0 0 20px 20px;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      border-color: white;
    }

    .nav-btn.active {
      background: white;
      color: #ff4444;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      padding: 2rem;
      border-radius: 15px;
      border: 1px solid #444;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(255, 68, 68, 0.3);
    }

    .stat-icon {
      font-size: 3rem;
      color: #ff4444;
      margin-bottom: 1rem;
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 1rem;
      color: #ccc;
    }

    .recent-activity {
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      padding: 2rem;
      border-radius: 15px;
      border: 1px solid #444;
    }

    .recent-activity h2 {
      color: #ff4444;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .activity-item {
      background: #333;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .activity-text {
      color: #ccc;
    }

    .activity-time {
      color: #888;
      font-size: 0.8rem;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #ccc;
    }

    .loading i {
      font-size: 2rem;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 1.5rem;
      }

      .header h1 {
        font-size: 2rem;
      }

      .container {
        padding: 1rem;
      }

      .dashboard-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .stat-card {
        padding: 1.5rem;
      }

      .nav-buttons {
        flex-direction: column;
        align-items: center;
      }

      .nav-btn {
        width: 200px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎬 Admin Dashboard</h1>
    <div class="nav-buttons">
      <a href="admin.html" class="nav-btn">
        <i class="fas fa-plus-circle"></i>
        Add Movies
      </a>
      <a href="admin-dashboard.html" class="nav-btn active">
        <i class="fas fa-tachometer-alt"></i>
        Dashboard
      </a>
      <a href="index.html" class="nav-btn">
        <i class="fas fa-arrow-left"></i>
        Back to Movies
      </a>
    </div>
  </div>

  <div class="container">
    <div class="dashboard-grid">
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-film"></i>
        </div>
        <div class="stat-number" id="totalMovies">0</div>
        <div class="stat-label">Total Movies</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-users"></i>
        </div>
        <div class="stat-number" id="totalUsers">0</div>
        <div class="stat-label">Total Users</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-star"></i>
        </div>
        <div class="stat-number" id="totalReviews">0</div>
        <div class="stat-label">Total Reviews</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <div class="stat-number" id="avgRating">0</div>
        <div class="stat-label">Average Rating</div>
      </div>
    </div>

    <div class="recent-activity">
      <h2>
        <i class="fas fa-clock"></i>
        Recent Activity
      </h2>
      <div id="recentActivity">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          Loading activity...
        </div>
      </div>
    </div>
  </div>

  <script>
    // Load dashboard statistics
    async function loadDashboardStats() {
      try {
        // Load movies count
        const moviesResponse = await fetch('http://localhost:3000/movies');
        const movies = await moviesResponse.json();
        document.getElementById('totalMovies').textContent = movies.length;

        // Load users count
        const usersResponse = await fetch('http://localhost:3000/users');
        const users = await usersResponse.json();
        document.getElementById('totalUsers').textContent = users.length;

        // Load reviews count and calculate average
        const reviewsResponse = await fetch('http://localhost:3000/all-reviews');
        const reviews = await reviewsResponse.json();
        document.getElementById('totalReviews').textContent = reviews.length;

        // Calculate average rating
        if (reviews.length > 0) {
          const avgRating = reviews.reduce((sum, review) => sum + review.rating, 0) / reviews.length;
          document.getElementById('avgRating').textContent = avgRating.toFixed(1);
        } else {
          document.getElementById('avgRating').textContent = '0';
        }

        // Load recent activity
        loadRecentActivity(reviews, movies);

      } catch (error) {
        console.error('Error loading dashboard stats:', error);
        document.getElementById('recentActivity').innerHTML = 
          '<p style="color: #ff4444;">Error loading dashboard data</p>';
      }
    }

    function loadRecentActivity(reviews, movies) {
      const activityContainer = document.getElementById('recentActivity');
      
      if (reviews.length === 0) {
        activityContainer.innerHTML = '<p style="color: #ccc;">No recent activity</p>';
        return;
      }

      // Get recent reviews (last 5)
      const recentReviews = reviews.slice(0, 5);
      
      let activityHTML = '';
      recentReviews.forEach(review => {
        const date = new Date(review.created_at);
        const timeAgo = getTimeAgo(date);
        
        activityHTML += `
          <div class="activity-item">
            <div class="activity-text">
              <strong>${review.username}</strong> reviewed 
              <strong>${review.movie_title}</strong> - 
              ${'⭐'.repeat(review.rating)}
            </div>
            <div class="activity-time">${timeAgo}</div>
          </div>
        `;
      });

      activityContainer.innerHTML = activityHTML;
    }

    function getTimeAgo(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      
      if (seconds < 60) return 'Just now';
      if (seconds < 3600) return Math.floor(seconds / 60) + ' minutes ago';
      if (seconds < 86400) return Math.floor(seconds / 3600) + ' hours ago';
      if (seconds < 604800) return Math.floor(seconds / 86400) + ' days ago';
      
      return date.toLocaleDateString();
    }

    // Load dashboard when page loads
    document.addEventListener('DOMContentLoaded', loadDashboardStats);
  </script>
</body>
</html>
