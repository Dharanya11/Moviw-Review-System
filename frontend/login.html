<!DOCTYPE html>
<html>

<head>
  <title>Login / Signup</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #222;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 5px;
      border: none;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      background: red;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: darkred;
    }
    .toggle {
      text-align: center;
      margin-top: 15px;
      cursor: pointer;
      color: #ccc;
    }
    .toggle:hover {
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 id="formTitle">Login</h1>
    
    <div id="loginForm">
      <input id="loginUsername" placeholder="Username">
      <input id="loginPassword" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
    
    <div id="signupForm" style="display: none;">
      <input id="signupUsername" placeholder="Username">
      <input id="signupPassword" type="password" placeholder="Password">
      <input id="signupConfirmPassword" type="password" placeholder="Confirm Password">
      <button onclick="signup()">Sign Up</button>
    </div>
    
    <div class="toggle" onclick="toggleForm()">
      <span id="toggleText">Don't have an account? Sign up</span>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    function toggleForm() {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const formTitle = document.getElementById('formTitle');
      const toggleText = document.getElementById('toggleText');
      
      if (loginForm.style.display === 'none') {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        formTitle.textContent = 'Login';
        toggleText.textContent = "Don't have an account? Sign up";
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        formTitle.textContent = 'Sign Up';
        toggleText.textContent = 'Already have an account? Login';
      }
    }

    function login() {
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      
      if (!username || !password) {
        alert('Please enter username and password');
        return;
      }
      
      fetch(`${window.API_CONFIG.apiBaseUrl}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
        .then(res => {
          if (!res.ok) {
            return res.json().then(data => {
              throw new Error(data.error || 'Login failed');
            });
          }
          return res.json();
        })
        .then(data => {
          localStorage.setItem('user', JSON.stringify(data));
          if (data.role === 'admin') {
            location = 'admin.html';
          } else {
            location = 'index.html';
          }
        })
        .catch(err => {
          alert('Login error: ' + err.message);
        });
    }

    function signup() {
      const username = document.getElementById('signupUsername').value;
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('signupConfirmPassword').value;
      
      if (!username || !password) {
        alert('Please enter username and password');
        return;
      }
      
      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }
      
      fetch(`${window.API_CONFIG.apiBaseUrl}/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            alert('Error: ' + data.error);
          } else {
            alert('Account created successfully! Please login.');
            toggleForm();
          }
        })
        .catch(err => {
          alert('Signup error: ' + err.message);
        });
    }
  </script>
</body>

</html>
