<!DOCTYPE html>
<html>

<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }
    
    .btn-back {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }
    
    .btn-back:hover {
      background: #f40612;
      transform: translateY(-2px);
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .header > div {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .container {
      display: flex;
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .section {
      background: #222;
      padding: 25px;
      border-radius: 10px;
      flex: 1;
    }
    
    h1, h2 {
      color: #ff4444;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: none;
      background: #333;
      color: white;
      box-sizing: border-box;
    }
    
    button {
      width: 100%;
      background: #ff4444;
      color: white;
      border: none;
      padding: 12px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }
    
    button:hover {
      background: #cc3333;
    }
    
    .user-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    .user-table th, .user-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    
    .user-table th {
      background: #333;
      font-weight: bold;
    }
    
    .user-table tr:hover {
      background: #333;
    }
    
    .action-buttons {
      display: flex;
      gap: 5px;
    }
    
    .btn-small {
      padding: 5px 10px;
      font-size: 12px;
      width: auto;
      margin: 0;
    }
    
    .btn-edit {
      background: #4CAF50;
    }
    
    .btn-delete {
      background: #f44336;
    }
    
    .btn-edit:hover {
      background: #45a049;
    }
    
    .btn-delete:hover {
      background: #da190b;
    }
    
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
    }
    
    .modal-content {
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      margin: 3% auto;
      padding: 0;
      border: 1px solid #444;
      border-radius: 16px;
      width: 90%;
      max-width: 900px;
      max-height: 85vh;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: modalSlideIn 0.3s ease;
    }
    
    @keyframes modalSlideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    .modal-content h2 {
      background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
      color: white;
      padding: 1.2rem 1.5rem;
      margin: 0;
      border-radius: 16px 16px 0 0;
      font-size: 1.4rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .close {
      color: white;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 50%;
      transition: all 0.3s ease;
      line-height: 1;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .close:hover,
    .close:focus {
      background: rgba(255,255,255,0.2);
      transform: rotate(90deg);
    }
  </style>
</head>

<body>
  <div class="header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <button class="btn-back" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
        Back to Movies
      </button>
      <h1>🎬 Admin Panel</h1>
      <div></div> <!-- Spacer for center alignment -->
    </div>
  </div>
  
  <div class="container">
    <!-- Add Movie Section -->
    <div class="section">
      <h2>Add Movie</h2>
      <div class="form-group">
        <input type="text" id="title" placeholder="Movie Title">
      </div>
      <div class="form-group">
        <input type="file" id="image" accept="image/*">
      </div>
      <div class="form-group">
        <input type="text" id="category" placeholder="Category">
      </div>
      <div class="form-group">
        <input type="text" id="desc" placeholder="Description">
      </div>
      <button onclick="addMovie()">Add Movie</button>
    </div>
    
    <!-- User Management Section -->
    <div class="section">
      <h2>User Management</h2>
      <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
        <button onclick="loadUsers()">Refresh Users</button>
        <button onclick="showAllReviews()" style="background: #ff4444;">View All Reviews</button>
      </div>
      
      <table class="user-table" id="userTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
        </tbody>
      </table>
    </div>
  </div>
  
  <!-- Edit User Modal -->
  <div id="editUserModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeEditModal()">&times;</span>
      <h2>Edit User</h2>
      <div class="form-group">
        <input type="hidden" id="editUserId">
        <input type="text" id="editUsername" placeholder="Username">
           </div>
      <div class="form-group">
        <select id="editRole">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button onclick="updateUser()">Update User</button>
    </div>
  </div>
  
  <!-- Reviews Modal -->
  <div id="reviewsModal" class="modal">
    <div class="modal-content" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
      <span class="close" onclick="closeReviewsModal()">&times;</span>
      <h2>Movie Reviews</h2>
      <div id="reviewsModalContent">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i> Loading reviews...
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // Load users on page load
    window.onload = function() {
      loadUsers();
    };

    // Back button function
    function goBack() {
      window.location.href = 'index.html';
    }

    // Reviews Modal Functions
    function showAllReviews() {
      document.getElementById('reviewsModal').style.display = 'block';
      loadAllReviews();
    }

    function closeReviewsModal() {
      document.getElementById('reviewsModal').style.display = 'none';
    }

    function loadAllReviews() {
      fetch(`${window.API_CONFIG.apiBaseUrl}/all-reviews`)
        .then(res => res.json())
        .then(data => {
          displayAllReviews(data);
        })
        .catch(err => {
          console.error('Error loading reviews:', err);
          document.getElementById('reviewsModalContent').innerHTML = 
            '<p style="color: #ff4444;">Failed to load reviews</p>';
        });
    }

    function displayAllReviews(reviews) {
      const content = document.getElementById('reviewsModalContent');
      
      if (reviews.length === 0) {
        content.innerHTML = '<p style="text-align: center; color: #ccc; padding: 2rem;">No reviews found</p>';
        return;
      }

      let html = '<div style="max-height: 60vh; overflow-y: auto; padding: 0.5rem;">';
      
      // Group reviews by movie
      const reviewsByMovie = {};
      reviews.forEach(review => {
        if (!reviewsByMovie[review.movie_title]) {
          reviewsByMovie[review.movie_title] = [];
        }
        reviewsByMovie[review.movie_title].push(review);
      });

      for (const movieTitle in reviewsByMovie) {
        html += `
          <div style="margin-bottom: 1.5rem; padding: 1.5rem; background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); border-radius: 12px; border: 1px solid #444; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
            <h3 style="color: #ff4444; margin: 0 0 1rem 0; font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;">
              <i class="fas fa-film"></i> ${movieTitle}
            </h3>
        `;
        
        reviewsByMovie[movieTitle].forEach((review, index) => {
          html += `
            <div style="background: #333; padding: 1.2rem; margin-bottom: ${index < reviewsByMovie[movieTitle].length - 1 ? '1rem' : '0'}; border-radius: 8px; position: relative; border-left: 3px solid #ff4444;">
              <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem;">
                <div style="display: flex; align-items: center; gap: 0.8rem;">
                  <div style="width: 40px; height: 40px; background: #ff4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.9rem;">
                    ${review.username.charAt(0).toUpperCase()}
                  </div>
                  <div>
                    <strong style="color: white; font-size: 1rem; display: block;">${review.username}</strong>
                    <span style="color: #888; font-size: 0.8rem;">User Review</span>
                  </div>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                  <span style="color: #ffd700; font-size: 1.1rem; font-weight: 600;">${'⭐'.repeat(review.rating)}</span>
                  <button 
                    onclick="deleteReview(${review.id})" 
                    style="background: #ff4444; color: white; border: none; padding: 0.5rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s ease; display: flex; align-items: center; gap: 0.3rem;"
                    title="Delete Review"
                    onmouseover="this.style.background='#ff6666'"
                    onmouseout="this.style.background='#ff4444'">
                    <i class="fas fa-trash"></i> Delete
                  </button>
                </div>
              </div>
              <div style="color: #ccc; line-height: 1.5; font-size: 0.95rem; padding: 0.5rem 0;">
                ${review.comment}
              </div>
            </div>
          `;
        });
        
        html += '</div>';
      }
      
      html += '</div>';
      content.innerHTML = html;
    }

    function deleteReview(reviewId) {
      if (confirm('Are you sure you want to delete this review?')) {
        fetch(`${window.API_CONFIG.apiBaseUrl}/reviews/${reviewId}`, {
          method: 'DELETE'
        })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            alert('Error: ' + data.error);
          } else {
            alert('Review deleted successfully');
            loadAllReviews(); // Refresh reviews
          }
        })
        .catch(err => {
          console.error('Error deleting review:', err);
          alert('Failed to delete review');
        });
      }
    }

    // Add Movie function (existing)
    function addMovie() {
      if (!title.value || !image.files[0] || !category.value || !desc.value) {
        alert('Please fill all fields and select an image');
        return;
      }
      
      const formData = new FormData();
      formData.append('image', image.files[0]);
      formData.append('title', title.value);
      formData.append('category', category.value);
      formData.append('description', desc.value);
      
      fetch(`${window.API_CONFIG.apiBaseUrl}/addMovie`, {
        method: 'POST',
        body: formData
      })
      .then(res => {
        console.log('Response status:', res.status);
        console.log('Response headers:', res.headers);
        return res.text(); // Get as text first to debug
      })
      .then(text => {
        console.log('Raw response:', text);
        try {
          const data = JSON.parse(text);
          if (data.error) {
            alert('Error: ' + data.error);
          } else {
            alert(data.message);
            // Clear form
            title.value = '';
            image.value = '';
            category.value = '';
            desc.value = '';
          }
        } catch (e) {
          console.error('JSON Parse Error:', e);
          alert('Server returned non-JSON response: ' + text);
        }
      })
      .catch(err => {
        console.error('Fetch Error:', err);
        alert('Error: ' + err.message);
      });
    }

    // User Management Functions
    function loadUsers() {
      fetch(`${window.API_CONFIG.apiBaseUrl}/users`)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('userTableBody');
          tbody.innerHTML = '';
          
          data.forEach(user => {
            const row = `
              <tr>
                <td>${user.id}</td>
                <td>${user.username}</td>
                <td>${user.role}</td>
                <td>
                  <div class="action-buttons">
                    <button class="btn-small btn-edit" onclick="editUser(${user.id}, '${user.username}', '${user.role}')">Edit</button>
                    <button class="btn-small btn-delete" onclick="deleteUser(${user.id})">Delete</button>
                  </div>
                </td>
              </tr>
            `;
            tbody.innerHTML += row;
          });
        })
        .catch(err => {
          console.error('Error loading users:', err);
          alert('Failed to load users');
        });
    }

    function editUser(id, username, role) {
      document.getElementById('editUserId').value = id;
      document.getElementById('editUsername').value = username;
      document.getElementById('editRole').value = role;
      document.getElementById('editUserModal').style.display = 'block';
    }

    function closeEditModal() {
      document.getElementById('editUserModal').style.display = 'none';
    }

    function updateUser() {
      const id = document.getElementById('editUserId').value;
      const username = document.getElementById('editUsername').value;
      const role = document.getElementById('editRole').value;
      
      if (!username) {
        alert('Username is required');
        return;
      }
      
      fetch(`${window.API_CONFIG.apiBaseUrl}/users/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, role })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          alert('Error: ' + data.error);
        } else {
          alert('User updated successfully');
          closeEditModal();
          loadUsers();
        }
      })
      .catch(err => {
        console.error('Error updating user:', err);
        alert('Failed to update user');
      });
    }

    function deleteUser(id) {
      if (confirm('Are you sure you want to delete this user?')) {
        console.log('Attempting to delete user:', id);
        
        fetch(`${window.API_CONFIG.apiBaseUrl}/users/${id}`, {
          method: 'DELETE'
        })
        .then(res => {
          console.log('Delete response status:', res.status);
          return res.json();
        })
        .then(data => {
          console.log('Delete response data:', data);
          
          if (data.error) {
            alert('Error: ' + data.error);
          } else {
            alert('User deleted successfully');
            loadUsers();
          }
        })
        .catch(err => {
          console.error('Error deleting user:', err);
          alert('Failed to delete user: ' + err.message);
        });
      }
    }
  </script>
</body>

</html>
