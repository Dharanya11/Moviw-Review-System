<!DOCTYPE html>
<html>

<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .container {
      display: flex;
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .section {
      background: #222;
      padding: 25px;
      border-radius: 10px;
      flex: 1;
    }
    
    h1, h2 {
      color: #ff4444;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: none;
      background: #333;
      color: white;
      box-sizing: border-box;
    }
    
    button {
      width: 100%;
      background: #ff4444;
      color: white;
      border: none;
      padding: 12px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }
    
    button:hover {
      background: #cc3333;
    }
    
    .user-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    .user-table th, .user-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    
    .user-table th {
      background: #333;
      font-weight: bold;
    }
    
    .user-table tr:hover {
      background: #333;
    }
    
    .action-buttons {
      display: flex;
      gap: 5px;
    }
    
    .btn-small {
      padding: 5px 10px;
      font-size: 12px;
      width: auto;
      margin: 0;
    }
    
    .btn-edit {
      background: #4CAF50;
    }
    
    .btn-delete {
      background: #f44336;
    }
    
    .btn-edit:hover {
      background: #45a049;
    }
    
    .btn-delete:hover {
      background: #da190b;
    }
    
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
    }
    
    .modal-content {
      background-color: #222;
      margin: 15% auto;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
    }
    
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }
    
    .close:hover {
      color: white;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>🎬 Admin Panel</h1>
  </div>
  
  <div class="container">
    <!-- Add Movie Section -->
    <div class="section">
      <h2>Add Movie</h2>
      <div class="form-group">
        <input type="text" id="title" placeholder="Movie Title">
      </div>
      <div class="form-group">
        <input type="file" id="image" accept="image/*">
      </div>
      <div class="form-group">
        <input type="text" id="category" placeholder="Category">
      </div>
      <div class="form-group">
        <input type="text" id="desc" placeholder="Description">
      </div>
      <button onclick="addMovie()">Add Movie</button>
    </div>
    
    <!-- User Management Section -->
    <div class="section">
      <h2>User Management</h2>
      <button onclick="loadUsers()">Refresh Users</button>
      
      <table class="user-table" id="userTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
        </tbody>
      </table>
    </div>
  </div>
  
  <!-- Edit User Modal -->
  <div id="editUserModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeEditModal()">&times;</span>
      <h2>Edit User</h2>
      <div class="form-group">
        <input type="hidden" id="editUserId">
        <input type="text" id="editUsername" placeholder="Username">
      </div>
      <div class="form-group">
        <select id="editRole">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button onclick="updateUser()">Update User</button>
    </div>
  </div>

  <script>
    // Load users on page load
    window.onload = function() {
      loadUsers();
    };

    // Add Movie function (existing)
    function addMovie() {
      if (!title.value || !image.files[0] || !category.value || !desc.value) {
        alert('Please fill all fields and select an image');
        return;
      }
      
      const formData = new FormData();
      formData.append('image', image.files[0]);
      formData.append('title', title.value);
      formData.append('category', category.value);
      formData.append('description', desc.value);
      
      fetch('http://localhost:3000/addMovie', {
        method: 'POST',
        body: formData
      })
      .then(res => {
        console.log('Response status:', res.status);
        console.log('Response headers:', res.headers);
        return res.text(); // Get as text first to debug
      })
      .then(text => {
        console.log('Raw response:', text);
        try {
          const data = JSON.parse(text);
          if (data.error) {
            alert('Error: ' + data.error);
          } else {
            alert(data.message);
            // Clear form
            title.value = '';
            image.value = '';
            category.value = '';
            desc.value = '';
          }
        } catch (e) {
          console.error('JSON Parse Error:', e);
          alert('Server returned non-JSON response: ' + text);
        }
      })
      .catch(err => {
        console.error('Fetch Error:', err);
        alert('Error: ' + err.message);
      });
    }

    // User Management Functions
    function loadUsers() {
      fetch('http://localhost:3000/users')
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('userTableBody');
          tbody.innerHTML = '';
          
          data.forEach(user => {
            const row = `
              <tr>
                <td>${user.id}</td>
                <td>${user.username}</td>
                <td>${user.role}</td>
                <td>
                  <div class="action-buttons">
                    <button class="btn-small btn-edit" onclick="editUser(${user.id}, '${user.username}', '${user.role}')">Edit</button>
                    <button class="btn-small btn-delete" onclick="deleteUser(${user.id})">Delete</button>
                  </div>
                </td>
              </tr>
            `;
            tbody.innerHTML += row;
          });
        })
        .catch(err => {
          console.error('Error loading users:', err);
          alert('Failed to load users');
        });
    }

    function editUser(id, username, role) {
      document.getElementById('editUserId').value = id;
      document.getElementById('editUsername').value = username;
      document.getElementById('editRole').value = role;
      document.getElementById('editUserModal').style.display = 'block';
    }

    function closeEditModal() {
      document.getElementById('editUserModal').style.display = 'none';
    }

    function updateUser() {
      const id = document.getElementById('editUserId').value;
      const username = document.getElementById('editUsername').value;
      const role = document.getElementById('editRole').value;
      
      if (!username) {
        alert('Username is required');
        return;
      }
      
      fetch(`http://localhost:3000/users/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, role })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          alert('Error: ' + data.error);
        } else {
          alert('User updated successfully');
          closeEditModal();
          loadUsers();
        }
      })
      .catch(err => {
        console.error('Error updating user:', err);
        alert('Failed to update user');
      });
    }

    function deleteUser(id) {
      if (confirm('Are you sure you want to delete this user?')) {
        fetch(`http://localhost:3000/users/${id}`, {
          method: 'DELETE'
        })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            alert('Error: ' + data.error);
          } else {
            alert('User deleted successfully');
            loadUsers();
          }
        })
        .catch(err => {
          console.error('Error deleting user:', err);
          alert('Failed to delete user');
        });
      }
    }
  </script>
</body>

</html>
