services:
  # Backend API Service
  - type: web
    name: movie-review-api
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server.js"
    workingDirectory: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /movies

  # Frontend Static Site
  - type: web
    name: movie-review-frontend
    runtime: static
    plan: free
    buildCommand: "echo 'No build required for static site'"
    staticPublishPath: ./frontend
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
